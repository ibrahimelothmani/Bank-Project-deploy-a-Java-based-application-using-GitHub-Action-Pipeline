name: CICD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build_and_test:
    name: Build & Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
      - name: Build and Test with Maven
        run: mvn clean package
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  code_analysis:
    name: Code Analysis
    runs-on: self-hosted
    needs: build_and_test
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"
      - name: SonarQube Code Analysis
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn sonar:sonar -Dsonar.projectKey=bank-project -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_TOKEN

  build_and_push_image:
    name: Build & push image
    runs-on: self-hosted
    needs: code_analysis
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bank-project:latest

  scan_image:
    name: Scan Image (Trivy)
    runs-on: self-hosted
    needs: build_and_push_image
    steps:
      - name: Trivy Installation
        run: |
          sudo apt-get install -y wget gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y
          sudo apt-get install -y trivy
      - name: Scan Docker Image
        run: trivy image --format table --exit-code 0 ${{ secrets.DOCKER_USERNAME }}/bank-project:latest

  deploy_image:
    name: Deploy Image
    runs-on: self-hosted
    needs: scan_image
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Kubernetes
        # Assumes the local runner has a valid kubeconfig connected to the dev/prod cluster (minikube on VM3)
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
